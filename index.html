<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alien Math Battle - Final Version</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

    <style>
        /* ================= ส่วนพื้นฐาน (Desktop & รวม) ================= */
        body { 
            font-family: 'Itim', cursive, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0;
            overflow: hidden; /* ซ่อนแถบเลื่อน */
            background-color: #87CEEB; 
            user-select: none; 
            -webkit-user-select: none;
            touch-action: none; /* ห้ามปัดจอเพื่อเลื่อน */
        }
        
        #game-screen { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            overflow: hidden;
            /* ป้องกันการโดนบีบแบนเมื่อคีย์บอร์ดเด้ง */
            min-height: 320px; 
        }

        /* ---------------- ฉาก ---------------- */
        .cloud { position: absolute; opacity: 0.8; z-index: 1; }
        .cloud1 { top: 10%; left: -200px; animation: floatCloud 30s linear infinite; height: 15%; }
        .cloud2 { top: 20%; right: -200px; animation: floatCloudReverse 45s linear infinite; height: 10%; }
        
        .tree { position: absolute; bottom: 15%; z-index: 2; width: 12vw; min-width: 80px; max-width: 150px;}
        .tree1 { left: 5%; }
        .tree2 { right: 5%; }

        #ground {
            position: absolute; bottom: 5%; width: 100%; height: 10%;
            background-image: url('grass1.png'); background-repeat: repeat-x; z-index: 3; background-size: contain;
        }
        #underground {
            position: absolute; bottom: 0; width: 100%; height: 5%;
            background-image: url('bg_wood.png'); background-repeat: repeat; z-index: 3;
        }

        /* ---------------- ตัวละคร ---------------- */
        .character {
            position: absolute; bottom: 13%; width: 15vw; 
            min-width: 80px; max-width: 120px; z-index: 4;
            transition: all 0.3s ease;
        }
        #player { left: 15%; }
        #enemy { right: 15%; transform: scaleX(-1); }

        /* แอนิเมชัน */
        @keyframes idleBreathing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .idle-anim { animation: idleBreathing 2s ease-in-out infinite; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0) scaleX(-1); }
            25% { transform: translateX(-5px) scaleX(-1); filter: brightness(0.5) red; }
            75% { transform: translateX(5px) scaleX(-1); filter: brightness(0.5) red; }
        }
        .damaged { animation: shake 0.2s 2; }
        
        @keyframes playerShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); filter: brightness(0.5) red; }
            75% { transform: translateX(5px); filter: brightness(0.5) red; }
        }
        .player-damaged { animation: playerShake 0.2s 2; }

        @keyframes floatCloud { from { left: -200px; } to { left: 110vw; } }
        @keyframes floatCloudReverse { from { right: -200px; } to { right: 110vw; } }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.5); opacity: 0; }
        }
        .dmg-text {
            position: absolute; bottom: 35%; z-index: 50;
            font-size: 40px; color: white; 
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            animation: floatUp 1s ease-out forwards; pointer-events: none;
        }

        /* ---------------- UI หลอดเลือด ---------------- */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hp-container {
            position: absolute; top: 20px; width: 25vw; min-width: 180px;
            background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 15px; color: white; 
            font-size: 20px; border: 2px solid rgba(255,255,255,0.2); letter-spacing: 1px;
        }
        #player-hp-box { left: max(20px, env(safe-area-inset-left)); text-align: left; }
        #enemy-hp-box { right: max(20px, env(safe-area-inset-right)); text-align: right; }
        .hp-bar-bg { width: 100%; height: 12px; background: #333; border-radius: 10px; margin-top: 5px; overflow: hidden; border: 2px solid #fff;}
        .hp-bar-fill { height: 100%; background: #28a745; width: 100%; transition: width 0.3s; }
        #enemy-hp-fill { background: #dc3545; }

        /* ---------------- แผงควบคุม (ปุ่มด้านล่าง) ---------------- */
        #control-panel {
            position: absolute; bottom: 5%; left: 0; width: 100%; 
            background: transparent; border: none; pointer-events: none; 
            display: flex; justify-content: center; align-items: flex-end; z-index: 20;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #action-buttons, #math-box-wrapper { pointer-events: auto; }

        button {
            padding: 12px 24px; font-size: 20px; font-family: 'Itim', cursive; 
            border: none; border-radius: 50px;
            cursor: pointer; margin: 0 10px; transition: 0.1s; 
            box-shadow: 0 5px #999; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        button:active { box-shadow: 0 2px #666; transform: translateY(3px); }
        .btn-attack { background-color: #ff9800; color: white; box-shadow: 0 5px #c57600; }
        .btn-magic { background-color: #9c27b0; color: white; box-shadow: 0 5px #6d1b7b; }

        /* ---------------- กล่องคณิตศาสตร์ ---------------- */
        #math-box { display: none; text-align: center; width: 100%; justify-content: center; pointer-events: auto; }
        #math-box-wrapper {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 3px solid #9c27b0;
        }
        #math-content { display: flex; justify-content: center; align-items: center; gap: 10px; }
        #question { font-size: 28px; margin: 0; color: #333; letter-spacing: 2px; }
        #math-box input { 
            font-family: 'Itim', cursive; font-size: 24px; width: 80px; text-align: center; padding: 5px; 
            border: 2px solid #ccc; border-radius: 8px; outline: none; 
        }
        #timer-bg { width: 100%; height: 8px; background: #ddd; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        #timer-fill { height: 100%; background: #ff4444; width: 100%; }

        /* ---------------- เมนูจบเกม ---------------- */
        #game-over-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; pointer-events: auto;
            backdrop-filter: blur(3px);
        }
        .modal-card {
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            padding: 40px; border-radius: 25px; border: 4px solid #fff; text-align: center;
        }
        #game-over-title { color: white; font-size: 40px; margin-top: 0; margin-bottom: 30px; }
        .btn-restart { 
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); 
            color: #000; font-size: 24px; padding: 15px 30px; border: 3px solid #fff; 
        }

        /* ---------------- ระบบเตือนแนวตั้ง ---------------- */
        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50; color: white; z-index: 9999; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        @media screen and (orientation: portrait) { #game-screen { display: none; } #orientation-warning { display: flex; } }

        /* ================= CSS แยกเฉพาะมือถือ (หน้าจอเล็กแนวนอน) ================= */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            
            /* ดันหลอดเลือดให้ชิดขอบบนมากขึ้น และปรับขนาดตัวหนังสือให้ใหญ่กำลังดี */
            .hp-container { top: 10px; width: 35vw; min-width: 160px; font-size: 16px; padding: 6px 12px; }
            .hp-bar-bg { height: 10px; }

            /* ย่อต้นไม้ไม่ให้บังจอ */
            .tree { width: 10vw; min-width: 60px; bottom: 18%; }
            
            /* ล็อกขนาดตัวละครให้ใหญ่พอมองเห็นชัดเจน แต่อย่าใหญ่จนชน UI */
            .character { width: 100px; bottom: 15%; }

            /* ปรับปุ่มโจมตีให้ใหญ่และกดง่ายขึ้น */
            #control-panel { bottom: 8px; }
            button { padding: 10px 20px; font-size: 18px; margin: 0 8px; }

            /* จัดกล่องคณิตศาสตร์ให้ลอยเด่น และปรับช่องพิมพ์ให้จิ้มง่าย */
            #math-box-wrapper { padding: 10px 20px; border-width: 2px; }
            #question { font-size: 24px; }
            #math-box input { font-size: 22px; width: 70px; padding: 4px; }
            .btn-magic { padding: 8px 16px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="orientation-warning">
        <div style="width: 60px; height: 100px; border: 4px solid white; border-radius: 10px; margin-bottom: 20px; position: relative;">
            <div style="width: 20px; height: 4px; background: white; position: absolute; bottom: 5px; left: 20px; border-radius: 2px;"></div>
        </div>
        <h2>กรุณาหมุนหน้าจอเป็น "แนวนอน"</h2>
    </div>

    <div id="game-screen">
        <img src="cloud1.png" class="cloud cloud1">
        <img src="cloud2.png" class="cloud cloud2">
        <img src="tree_oak.png" class="tree tree1">
        <img src="tree_pine.png" class="tree tree2">
        <div id="ground"></div>
        <div id="underground"></div>

        <img id="player" class="character idle-anim" src="character_green_idle.png">
        <img id="enemy" class="character idle-anim" src="character_purple_idle.png">

        <div id="ui-layer">
            <div class="hp-container" id="player-hp-box">
                ฮีโร่ HP: <span id="player-hp-text">100</span>
                <div class="hp-bar-bg"><div id="player-hp-fill" class="hp-bar-fill"></div></div>
            </div>
            <div class="hp-container" id="enemy-hp-box">
                ศัตรู HP: <span id="enemy-hp-text">100</span>
                <div class="hp-bar-bg"><div id="enemy-hp-fill" class="hp-bar-fill"></div></div>
            </div>
        </div>

        <div id="control-panel">
            <div id="action-buttons">
                <button class="btn-attack" onclick="normalAttack()">⚔️ โจมตี</button>
                <button class="btn-magic" onclick="openMathMagic()">✨ ร่ายเวทคณิต</button>
            </div>
            
            <div id="math-box">
                <div id="math-box-wrapper">
                    <div id="math-content">
                        <h2 id="question">10 + 5 = ?</h2>
                        <input type="number" id="answer-input" placeholder="ตอบ" autocomplete="off" inputmode="numeric">
                        <button class="btn-magic" onclick="checkAnswer()">ยิงพลัง</button>
                    </div>
                    <div id="timer-bg"><div id="timer-fill"></div></div>
                </div>
            </div>
        </div>

        <div id="game-over-menu">
            <div class="modal-card">
                <h1 id="game-over-title">คุณชนะแล้ว!</h1>
                <button class="btn-restart" onclick="restartGame()">🔄 เล่นใหม่อีกครั้ง</button>
            </div>
        </div>
    </div>

    <script>
        // --- ระบบล็อกความสูงหน้าจอ ป้องกันคีย์บอร์ดบีบแบน ---
        let originalHeight = window.innerHeight;
        
        function lockGameSize() {
            // ถ้าย่อจอลงมากกว่า 25% แสดงว่าเป็นฝีมือคีย์บอร์ดเด้งแน่ๆ ให้ข้ามการวาดจอใหม่ไปเลย!
            if (window.innerHeight < originalHeight * 0.75) {
                return;
            }
            // ถ้าหน้าจอพลิกจริงๆ (เช่น สลับไปมา) ให้อัปเดตความสูงใหม่
            originalHeight = window.innerHeight;
            const gameScreen = document.getElementById('game-screen');
            gameScreen.style.width = window.innerWidth + 'px';
            gameScreen.style.height = originalHeight + 'px';
        }

        window.addEventListener('resize', lockGameSize);
        window.addEventListener('orientationchange', () => {
            setTimeout(lockGameSize, 100); // รอจังหวะหมุนเสร็จนิดนึง
        });
        lockGameSize(); // ล็อกขนาดทันทีตอนเปิดเกม

        // --- ระบบเกม ---
        let playerHp = 100;
        let enemyHp = 100;
        let correctAnswer = 0;
        let isPlayerTurn = true;
        let countdownTimer;

        const playerImg = document.getElementById('player');
        const enemyImg = document.getElementById('enemy');
        const attackSound = new Audio('laserLarge_003.ogg');

        function updateUI() {
            document.getElementById('player-hp-text').innerText = Math.max(0, playerHp);
            document.getElementById('enemy-hp-text').innerText = Math.max(0, enemyHp);
            document.getElementById('player-hp-fill').style.width = Math.max(0, playerHp) + '%';
            document.getElementById('enemy-hp-fill').style.width = Math.max(0, enemyHp) + '%';

            if (enemyHp <= 0) setTimeout(() => showGameOver(true), 800);
            else if (playerHp <= 0) setTimeout(() => showGameOver(false), 800);
        }

        function showFloatingDamage(targetId, damage, color) {
            let floatEl = document.createElement('div');
            floatEl.innerText = "-" + damage;
            floatEl.className = 'dmg-text';
            floatEl.style.color = color;
            floatEl.style.left = targetId === 'player' ? '18%' : 'auto';
            floatEl.style.right = targetId === 'enemy' ? '18%' : 'auto';
            document.getElementById('game-screen').appendChild(floatEl);
            setTimeout(() => floatEl.remove(), 1000);
        }

        function playAttackAnimation(attacker, target, damage, callback) {
            let colorPrefix = attacker.id === 'player' ? 'green' : 'purple';
            
            attacker.src = `character_${colorPrefix}_jump.png`;
            attacker.classList.remove('idle-anim');
            
            if(attacker.id === 'player') attacker.style.left = "40%"; 
            else attacker.style.right = "40%"; 

            setTimeout(() => {
                attacker.src = `character_${colorPrefix}_walk_a.png`;
                attackSound.cloneNode(true).play();
                
                if(target.id === 'enemy') {
                    target.src = "character_purple_hit.png";
                    target.classList.add('damaged');
                    showFloatingDamage('enemy', damage, '#ffeb3b'); 
                } else {
                    target.classList.add('player-damaged');
                    showFloatingDamage('player', damage, '#ff5252'); 
                }
                updateUI();
                
                setTimeout(() => {
                    attacker.style.left = attacker.id === 'player' ? "15%" : "";
                    attacker.style.right = attacker.id === 'enemy' ? "15%" : "";
                    
                    attacker.src = `character_${colorPrefix}_idle.png`;
                    attacker.classList.add('idle-anim');
                    
                    if(target.id === 'enemy') target.src = "character_purple_idle.png";
                    target.classList.remove('damaged');
                    target.classList.remove('player-damaged');
                    
                    if(callback) setTimeout(callback, 500);
                }, 400);
            }, 300);
        }

        function normalAttack() {
            if (!isPlayerTurn || playerHp <= 0 || enemyHp <= 0) return;
            isPlayerTurn = false;
            let dmg = Math.floor(Math.random() * 5) + 5; 
            enemyHp -= dmg;
            playAttackAnimation(playerImg, enemyImg, dmg, enemyTurn);
        }

        function enemyTurn() {
            if (enemyHp <= 0 || playerHp <= 0) return;
            setTimeout(() => {
                let dmg = Math.floor(Math.random() * 10) + 5; 
                playerHp -= dmg;
                playAttackAnimation(enemyImg, playerImg, dmg, () => { isPlayerTurn = true; });
            }, 1000);
        }

        function openMathMagic() {
            if (!isPlayerTurn || playerHp <= 0 || enemyHp <= 0) return;
            
            document.getElementById('action-buttons').style.display = 'none';
            document.getElementById('math-box').style.display = 'flex';
            
            let isPlus = Math.random() > 0.5;
            let num1 = Math.floor(Math.random() * 20) + 10;
            let num2 = Math.floor(Math.random() * 10) + 1;
            
            if (isPlus) {
                correctAnswer = num1 + num2;
                document.getElementById('question').innerText = num1 + " + " + num2 + " = ?";
            } else {
                correctAnswer = num1 - num2;
                document.getElementById('question').innerText = num1 + " - " + num2 + " = ?";
            }
            
            let inputField = document.getElementById('answer-input');
            inputField.value = '';
            inputField.focus();

            let timerFill = document.getElementById('timer-fill');
            timerFill.style.transition = 'none';
            timerFill.style.width = '100%';
            
            setTimeout(() => {
                timerFill.style.transition = 'width 7s linear';
                timerFill.style.width = '0%';
            }, 50);

            clearTimeout(countdownTimer);
            countdownTimer = setTimeout(() => { magicFailed(); }, 7000);
        }

        function checkAnswer() {
            let userAns = parseInt(document.getElementById('answer-input').value);
            if (isNaN(userAns)) return; 
            clearTimeout(countdownTimer); 

            document.getElementById('math-box').style.display = 'none';
            document.getElementById('action-buttons').style.display = 'block';
            isPlayerTurn = false;

            if (userAns === correctAnswer) {
                let dmg = Math.floor(Math.random() * 15) + 20; 
                enemyHp -= dmg;
                playerImg.src = "character_green_walk_b.png"; 
                
                setTimeout(() => {
                    attackSound.cloneNode(true).play();
                    enemyImg.src = "character_purple_hit.png";
                    enemyImg.classList.add('damaged');
                    showFloatingDamage('enemy', dmg, '#18ffff'); 
                    updateUI();
                    
                    playerImg.src = "character_green_idle.png";
                    setTimeout(() => {
                        enemyImg.src = "character_purple_idle.png";
                        enemyImg.classList.remove('damaged');
                        enemyTurn();
                    }, 600);
                }, 500);
            } else {
                magicFailed();
            }
        }

        function magicFailed() {
            document.getElementById('math-box').style.display = 'none';
            document.getElementById('action-buttons').style.display = 'block';
            isPlayerTurn = false;

            playerHp -= 10;
            playerImg.classList.add('player-damaged');
            showFloatingDamage('player', 10, '#ff5252');
            
            attackSound.cloneNode(true).play();
            updateUI();
            
            setTimeout(() => {
                playerImg.classList.remove('player-damaged');
                enemyTurn();
            }, 600);
        }

        function showGameOver(isWin) {
            let menu = document.getElementById('game-over-menu');
            let title = document.getElementById('game-over-title');
            title.innerText = isWin ? "🎉 ชนะแล้ว ยอดเยี่ยม!" : "💀 พ่ายแพ้ ลองใหม่นะ!";
            title.style.color = isWin ? "#fff" : "#ffcccc";
            menu.style.display = 'flex';
        }

        function restartGame() {
            playerHp = 100;
            enemyHp = 100;
            isPlayerTurn = true;
            document.getElementById('game-over-menu').style.display = 'none';
            playerImg.src = "character_green_idle.png";
            enemyImg.src = "character_purple_idle.png";
            updateUI();
        }

        // เวลากดปุ่ม Go หรือ Enter ในคีย์บอร์ดมือถือ ให้ยิงพลังทันที
        document.getElementById("answer-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // ป้องกันการเด้งของจอ
                this.blur(); // หุบคีย์บอร์ดลงอัตโนมัติ
                checkAnswer();
            }
        });
    </script>
</body>
</html>
